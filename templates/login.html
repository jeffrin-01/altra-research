<!-- templates/login.html -->
{% extends "base.html" %}
{% block title %}Login - Altra Research{% endblock %}
{% block content %}
<style>
    .login-container {
        max-width: 450px;
        margin: 0 auto;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h2 {
        color: var(--primary-color);
        font-size: clamp(24px, 5vw, 32px);
        margin-bottom: 10px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: clamp(14px, 2.5vw, 16px);
    }

    .form-input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: clamp(14px, 2.5vw, 16px);
        transition: var(--transition);
        background: var(--light-bg);
        min-height: 44px;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.1);
        background: var(--white);
    }

    .form-input:hover {
        border-color: var(--accent-color);
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary-color);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: clamp(16px, 3vw, 18px);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        min-height: 44px;
        margin-top: 10px;
    }

    .submit-btn:hover, .submit-btn:focus {
        background: var(--secondary-color);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(26, 35, 126, 0.3);
        outline: none;
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    .register-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: clamp(14px, 2.5vw, 16px);
    }

    .register-link a {
        color: var(--accent-color);
        text-decoration: none;
        font-weight: 600;
        padding: 5px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
    }

    .register-link a:hover, .register-link a:focus {
        text-decoration: underline;
        outline: none;
    }
</style>

<div class="login-container">
    <div class="login-header">
        <h2>🔐 Welcome Back</h2>
        <p style="color: #666;">Sign in to your Altra Research account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
        <div class="form-group">
            <label for="username">👤 Username</label>
            <input type="text" id="username" name="username" class="form-input" 
                   required autofocus placeholder="Enter your username"
                   autocomplete="username" tabindex="0"
                   aria-label="Username input">
        </div>

        <div class="form-group">
            <label for="password">🔒 Password</label>
            <input type="password" id="password" name="password" class="form-input" 
                   required placeholder="Enter your password"
                   autocomplete="current-password" tabindex="0"
                   aria-label="Password input">
        </div>

        <button type="submit" class="submit-btn" tabindex="0">
            Sign In
        </button>
    </form>

    <div class="register-link">
        New to Altra Research? <a href="{{ url_for('register') }}" tabindex="0">Create an account</a>
    </div>
</div>

<script>
    // Keyboard navigation enhancement
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
            const form = document.activeElement.closest('form');
            if (form) {
                const inputs = Array.from(form.querySelectorAll('input'));
                const currentIndex = inputs.indexOf(document.activeElement);
                if (currentIndex < inputs.length - 1) {
                    inputs[currentIndex + 1].focus();
                } else {
                    form.querySelector('button[type="submit"]').click();
                }
            }
        }
    });

    // Touch feedback for mobile
    document.querySelectorAll('.submit-btn').forEach(btn => {
        btn.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.98)';
        });
        btn.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        });
    });
</script>
{% endblock %}
