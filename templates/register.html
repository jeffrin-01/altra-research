<!-- templates/register.html -->
{% extends "base.html" %}
{% block title %}Register - Altra Research{% endblock %}
{% block content %}
<style>
    .register-container {
        max-width: 500px;
        margin: 0 auto;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .register-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .register-header h2 {
        color: var(--primary-color);
        font-size: clamp(24px, 5vw, 32px);
        margin-bottom: 10px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: clamp(14px, 2.5vw, 16px);
    }

    .form-input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: clamp(14px, 2.5vw, 16px);
        transition: var(--transition);
        background: var(--light-bg);
        min-height: 44px;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.1);
        background: var(--white);
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary-color);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: clamp(16px, 3vw, 18px);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        min-height: 44px;
        margin-top: 10px;
    }

    .submit-btn:hover, .submit-btn:focus {
        background: var(--secondary-color);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(26, 35, 126, 0.3);
        outline: none;
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: clamp(14px, 2.5vw, 16px);
    }

    .login-link a {
        color: var(--accent-color);
        text-decoration: none;
        font-weight: 600;
        padding: 5px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
    }

    .required {
        color: #c62828;
        margin-left: 4px;
    }
</style>

<div class="register-container">
    <div class="register-header">
        <h2>📝 Create Account</h2>
        <p style="color: #666;">Join Altra Research's talent network</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" autocomplete="on">
        <div class="form-group">
            <label for="full_name">Full Name <span class="required">*</span></label>
            <input type="text" id="full_name" name="full_name" class="form-input" 
                   required placeholder="John Doe" tabindex="0"
                   autocomplete="name" aria-label="Full name">
        </div>

        <div class="form-group">
            <label for="username">Username <span class="required">*</span></label>
            <input type="text" id="username" name="username" class="form-input" 
                   required placeholder="johndoe" tabindex="0"
                   autocomplete="username" aria-label="Username">
        </div>

        <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-input" 
                   required placeholder="john@example.com" tabindex="0"
                   autocomplete="email" aria-label="Email address">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-input" 
                   placeholder="+1 (555) 123-4567" tabindex="0"
                   autocomplete="tel" aria-label="Phone number">
        </div>

        <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <input type="password" id="password" name="password" class="form-input" 
                   required placeholder="Min. 8 characters" tabindex="0"
                   autocomplete="new-password" aria-label="Password"
                   minlength="8">
        </div>

        <button type="submit" class="submit-btn" tabindex="0">
            🎉 Create Account
        </button>
    </form>

    <div class="login-link">
        Already have an account? <a href="{{ url_for('login') }}" tabindex="0">Sign in</a>
    </div>
</div>

<script>
    // Password validation
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters long');
            return false;
        }
    });

    // Touch feedback
    document.querySelector('.submit-btn').addEventListener('touchstart', function() {
        this.style.transform = 'scale(0.98)';
    });
    document.querySelector('.submit-btn').addEventListener('touchend', function() {
        this.style.transform = 'scale(1)';
    });
</script>
{% endblock %}
